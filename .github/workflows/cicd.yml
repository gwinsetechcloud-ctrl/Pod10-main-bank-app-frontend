name: Bank Frontend Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: bank-frontend
  API_URL: https://bankapi.cohort5pod10.online

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          IMAGE_TAG: ${{ github.run_number }}
        run: |
          docker build \
            --build-arg REACT_APP_API_URL=${{ env.API_URL }} \
            -t ${{ vars.ECR_REPO }}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG} \
            .
          docker push ${{ vars.ECR_REPO }}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}

  update-k8s-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Update image tag in infrastructure manifests
        env:
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
          IMAGE_TAG: ${{ github.run_number }}
        run: |
          git clone https://${GIT_USERNAME}:${GIT_PASSWORD}@github.com/gwinsetechcloud-ctrl/Pod10-infrastructure-main.git
          cd Pod10-infrastructure-main
          git config user.email "gwinsetech@gmail.com"
          git config user.name "gwinsetechcloud-ctrl"
          sed -i "s|${{ vars.ECR_REPO }}/bank-frontend:.*|${{ vars.ECR_REPO }}/bank-frontend:${IMAGE_TAG}|g" k8s/bank-app/frontend-deployment.yaml
          grep -q "${{ vars.ECR_REPO }}/bank-frontend:${IMAGE_TAG}" k8s/bank-app/frontend-deployment.yaml
          git add k8s/bank-app/frontend-deployment.yaml
          git diff --staged --quiet || git commit -m "ci(frontend): image tag ${IMAGE_TAG}"
          git push origin main
